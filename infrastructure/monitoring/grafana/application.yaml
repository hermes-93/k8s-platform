apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 7.3.9
    helm:
      values: |
        replicas: 1

        persistence:
          enabled: true
          size: 5Gi

        adminUser: admin
        adminPassword: ""   # set via Secret / ESO
        adminPasswordSecretName: grafana-admin-secret

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
                isDefault: true
                access: proxy
              - name: Loki
                type: loki
                url: http://loki.monitoring.svc.cluster.local:3100
                access: proxy
                jsonData:
                  maxLines: 5000

        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: platform
                orgId: 1
                folder: Platform
                type: file
                disableDeletion: true
                editable: false
                options:
                  path: /var/lib/grafana/dashboards/platform

        dashboardsConfigMaps:
          platform: grafana-dashboards

        ingress:
          enabled: true
          ingressClassName: nginx
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
          hosts:
            - grafana.example.com
          tls:
            - secretName: grafana-tls
              hosts:
                - grafana.example.com

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
