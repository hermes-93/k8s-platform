apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.4.0
    helm:
      values: |
        alertmanager:
          enabled: true
          alertmanagerSpec:
            replicas: 2
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: standard
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 5Gi

        prometheus:
          prometheusSpec:
            replicas: 2
            retention: 30d
            retentionSize: 40GB
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: standard
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 50Gi
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                cpu: 1000m
                memory: 4Gi
            # Scrape all ServiceMonitors across namespaces
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false

        grafana:
          enabled: false  # deployed separately

        nodeExporter:
          enabled: true

        kubeStateMetrics:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
