apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/frontend.yaml
  - ../../base/backend.yaml

patches:
  - target:
      kind: Application
      name: frontend
    patch: |-
      - op: replace
        path: /spec/syncPolicy
        value:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
      - op: add
        path: /spec/source/helm/valueFiles/-
        value: ../../apps/overlays/dev/frontend-values.yaml
  - target:
      kind: Application
      name: backend
    patch: |-
      - op: replace
        path: /spec/syncPolicy
        value:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
      - op: add
        path: /spec/source/helm/valueFiles/-
        value: ../../apps/overlays/dev/backend-values.yaml
