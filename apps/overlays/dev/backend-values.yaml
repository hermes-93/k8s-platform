## Dev overrides for backend
replicaCount: 1

image:
  repository: ghcr.io/hermes-93/backend
  tag: dev

ingress:
  enabled: true
  hosts:
    - host: api.dev.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: backend-dev-tls
      hosts:
        - api.dev.example.com

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

env:
  - name: ENVIRONMENT
    value: dev
  - name: LOG_LEVEL
    value: debug
  - name: DB_HOST
    value: postgres.postgres.svc.cluster.local
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: backend-secrets
        key: db-password
