## Staging overrides for frontend
replicaCount: 2

image:
  repository: ghcr.io/hermes-93/frontend
  tag: staging

ingress:
  enabled: true
  hosts:
    - host: frontend.staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: frontend-staging-tls
      hosts:
        - frontend.staging.example.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

env:
  - name: ENVIRONMENT
    value: staging
  - name: LOG_LEVEL
    value: info
  - name: API_URL
    value: http://backend.backend.svc.cluster.local
