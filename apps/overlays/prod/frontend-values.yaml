## Production overrides for frontend
replicaCount: 3

image:
  repository: ghcr.io/hermes-93/frontend
  tag: ""  # Set by image-updater or CI pipeline

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: frontend-prod-tls
      hosts:
        - app.example.com

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60

podDisruptionBudget:
  enabled: true
  minAvailable: 2

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack

env:
  - name: ENVIRONMENT
    value: production
  - name: LOG_LEVEL
    value: warning
  - name: API_URL
    value: http://backend.backend.svc.cluster.local
