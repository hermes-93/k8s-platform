---
# Require explicit image tags — no :latest
# Implements: CIS Kubernetes 5.3.1
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      The :latest image tag is mutable and can result in unexpected changes
      to running workloads. Pinning to a specific digest or immutable tag
      ensures reproducible and auditable deployments.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: "Image tag is required. Use a specific version tag, not :latest."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image }}"
                    operator: NotContains
                    value: ":"

    - name: require-image-digest
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["production"]
      validate:
        message: >-
          Production images must be pinned to a digest (@sha256:...) for
          immutability guarantees.
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: NotContains
                    value: "@sha256:"
