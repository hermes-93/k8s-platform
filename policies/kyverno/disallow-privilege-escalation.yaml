---
# Deny containers that allow privilege escalation
# Implements: PSS Restricted / CIS Kubernetes 5.2.5
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privilege-escalation
  annotations:
    policies.kyverno.io/title: Disallow Privilege Escalation
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Privilege escalation allows a process to gain more privileges than its
      parent process. Setting allowPrivilegeEscalation=false is required under
      the Restricted Pod Security profile and prevents container breakouts.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: no-privilege-escalation
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["default", "production", "staging"]
      validate:
        message: >-
          Privilege escalation is not allowed. Set
          securityContext.allowPrivilegeEscalation=false on all containers.
        pattern:
          spec:
            containers:
              - securityContext:
                  allowPrivilegeEscalation: "false"
            =(initContainers):
              - securityContext:
                  allowPrivilegeEscalation: "false"
